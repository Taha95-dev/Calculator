<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="styles.css">
<title>Pro Calculator with Side History</title>
<script>
        // Simple password protection for Fiverr demos
        const PASSWORD = "demo2024";
        const userPass = prompt("🔒 Demo Access\n\nContact taha95-dev on Fiverr for password:");
        
        if (userPass !== PASSWORD) {
            document.body.innerHTML = `
                <div style="text-align:center;margin-top:100px;font-family:Arial">
                    <h1>🔒 Access Denied</h1>
                    <p>This demo is for authorized clients only.</p>
                    <p>📧 Contact <strong>taha95-dev</strong> on Fiverr</p>
                    <p style="color:#666;margin-top:50px">Professional graphing solutions available</p>
                </div>
            `;
            throw new Error("Unauthorized access");
        }
    </script>
</head>
<body>
<div class="container">
    <div class="calculator-wrapper">
        <!-- Calculator -->
        <div class="calculator">
            <input type="text" id="display" readonly>
            <div class="buttons"></div>
            <button id="clearHistory">Clear History</button>
            <button id="pi">π</button>
            <button id="E">e</button>
            <button id="power">^x</button>
        </div>

        <!-- History Panel -->
        <div class="history-panel">
            <h3>History</h3>
            <ul id="history"></ul>
        </div>
    </div>
</div>

<script src="main.js"></script>
</body>
</html>
